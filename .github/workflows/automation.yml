name: Daily Phone Capture Rate Tracker & Email Report

on:
  schedule:
    # Run daily at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  phone-capture-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl "PyJWT[crypto]" requests cryptography typing_extensions

      - name: Create required directories
        run: |
          mkdir -p Data
          mkdir -p output

      - name: Run Phone Capture Rate Tracker
        run: |
          echo "Starting phone capture rate analysis..."
          python Rista.py
          echo "Phone tracker completed"

      - name: Run Processing
        run: |
          echo "Starting processing..."
          python Processing.py
          echo "Processing completed"

      - name: Send Email Report
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: |
          echo "Sending email report..."
          python Test_mail.py
          echo "Email sent successfully"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phone-capture-reports
          path: |
            output/*.xlsx
            output/*_log.txt
          retention-days: 7

      - name: Cleanup old files
        run: |
          # Keep only last 7 days of output files
          find output/ -name "Phone No Record - *.xlsx" -type f -mtime +7 -delete
          find output/ -name "*_log.txt" -type f -mtime +7 -delete
